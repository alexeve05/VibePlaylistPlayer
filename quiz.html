<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz - Vibe Player</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="quiz-layout">
      <!-- INTRO SCREEN -->
      <div class="intro-screen" id="intro-screen">
        <h1 class="title">Take the Quiz</h1>
        <p class="subtitle">find your perfect vibe</p>
        <div class="opening-selection">
          <button class="start-quiz-button">Start Quiz</button>
          <button class="back-button" onclick="goToHome()">
            < Back to Home
          </button>
        </div>
      </div>
      <!-- QUIZ CONTENT -->
      <div class="quiz-content" id="quiz-content" style="display: none">
        <p id="progress-text"></p>
        <div class="question">
          <h2 id="question-text"></h2>
          <div id="answers-container"></div>
        </div>
      </div>
    </main>
    <script src="js/app.js"></script>
    <script src="js/quiz.js"></script>
  </body>
</html>
